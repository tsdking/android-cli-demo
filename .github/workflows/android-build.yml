name: Android Build with CLI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Install Android CLI
      run: |
        # Install Android CLI
        mkdir -p ~/.local/bin
        curl -fsSL https://dl.google.com/android/cli/latest/linux_x86_64/android -o ~/.local/bin/android
        chmod +x ~/.local/bin/android
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    
    - name: Verify Android CLI installation
      run: |
        android --version
    
    - name: Show Android CLI capabilities
      run: |
        echo "=== Android CLI Help ==="
        android --help
        
        echo -e "\n=== Create command help ==="
        android create --help
        
        echo -e "\n=== Available templates ==="
        android create --list
    
    - name: Test Gradle wrapper
      run: |
        # Make gradlew executable
        chmod +x ./gradlew
        
        # Show Gradle version
        ./gradlew --version
        
        # Show available tasks
        echo "=== Available Gradle tasks ==="
        ./gradlew tasks --all | grep -E "(assemble|build|test)" | head -10 || echo "Could not list tasks"
    
    - name: Try basic Gradle operations
      run: |
        # Try to compile Kotlin code (without full Android SDK)
        echo "=== Trying Kotlin compilation ==="
        ./gradlew compileDebugKotlin --dry-run || echo "Kotlin compilation check failed"
        
        # Check project structure
        echo -e "\n=== Project structure ==="
        find . -name "*.kt" -o -name "*.java" -o -name "*.gradle*" | sort | head -15
    
    - name: Create test project with Android CLI
      run: |
        echo "=== Creating test project with Android CLI ==="
        mkdir -p test-dir
        cd test-dir
        
        # Create a new project
        android create --name="TestApp" --minSdk=24 -o ./test-app
        
        echo "=== Test project created successfully ==="
        echo "Project location: $(pwd)/test-app"
        
        # Show created files
        find test-app -type f \( -name "*.kt" -o -name "*.java" -o -name "AndroidManifest.xml" -o -name "*.gradle*" \) | sort | head -10
    
    - name: Archive test project
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: android-cli-test-output
        path: |
          test-dir/
        retention-days: 1